name: Publish Python Package

run-name: Publish ${{ github.ref_name }} to PyPI

on:
  push:
    tags:
      - "v*"

# Prevent two executions for the same tag from publishing simultaneously.
concurrency:
  group: pypi-${{ github.ref }}

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest

    # The build job only needs to read the repository.
    permissions:
      contents: read

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python3 -m pip install --user build twine

      - name: Build source and wheel distributions
        run: python3 -m build

      - name: Check distribution integrity
        run: python3 -m twine check --strict dist/*

      - name: Upload distributions for publishing
        uses: actions/upload-artifact@v5
        with:
          name: python-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/astro-nifty

    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v6
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
